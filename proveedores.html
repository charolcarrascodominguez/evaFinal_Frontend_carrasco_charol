<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscar Proveedor | LicitaSeguro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">LicitaSeguro</a>
    </div>
</nav>

<div class="container mt-4">
    <h1>Buscar Proveedor por RUT</h1>

    <form id="formProveedor" class="row g-3" aria-label="Formulario búsqueda proveedor">
        
        <div class="col-md-8">
            <label for="rut" class="form-label">RUT</label>
            <input type="text" id="rut" class="form-control"
                placeholder="Ej: 77.653.382-3"
                required>
        </div>

        <div class="col-md-4 align-self-end">
            <button type="submit" class="btn btn-primary w-100">
                Buscar
            </button>
        </div>
    </form>

    <div id="error" class="d-none mt-3" role="alert"></div>

    <div id="loader" class="text-center d-none">
        <div class="spinner-border text-primary"></div>
    </div>

    <div id="resultadoProveedor" tabindex="0"></div>
</div>

<footer>
    © 2026 LicitaSeguro - Autor: Charol Carrasco
</footer>

<script type="module" src="js/proveedores.js"></script>
</body>
</html>
